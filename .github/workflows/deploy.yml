name: 🚀 Despliegue Automático mHealth
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: 🛠️ Compilar y Desplegar
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Obtener código fuente
        uses: actions/checkout@v4
      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Instalar dependencias
        run: npm install
      - name: 🏗️ Inyectar variables y compilar (Build)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: 🔍 Verificar build
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: el directorio dist no existe."
            exit 1
          fi
          ls -la dist/
      - name: 📂 Sincronizar con Hostinger vía SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          port: 65002
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: ./dist/*
          remote_path: /home/u911641859/domains/controldesalud.koradigital.net/public_html/
          sftp_only: true
