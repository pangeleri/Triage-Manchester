name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master # Triggers on push to either main or master branches

jobs:
  build-and-deploy:
    name: Build & FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Run Linter
        run: npm run lint

      - name: 🏗️ Build application
        # Inject the Supabase environment variables at build-time so Vite compiles them into the app.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: 🚀 Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }} # e.g. ftp.triagegrierson.app.koradigital.net or Hostinger's IP
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/ # Adjust if you deploy to a custom subdirectory on Hostinger
          dangerous-clean-slate: false # Set to true if you want to delete old files on server first
