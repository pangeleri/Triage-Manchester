name: 🚀 Despliegue Automático mHealth
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: 🛠️ Compilar y Desplegar
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Obtener código fuente
        uses: actions/checkout@v4
      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 📦 Instalar dependencias
        run: npm install
      - name: 🏗️ Inyectar variables y compilar (Build)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: 🔍 Verificar build
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: el directorio dist no existe."
            exit 1
          fi
          ls -la dist/
      - name: 📂 Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config
      - name: 📂 Sincronizar con Hostinger vía SSH
        run: |
          rsync -avzr --delete -e "ssh -i ~/.ssh/id_ed25519 -p 65002" \
            dist/ \
            u911641859@147.79.84.184:/home/u911641859/domains/controldesalud.koradigital.net/public_html/